  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR (same as index.html) -->

    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="../assets/images/logo-on-dark.png" alt="Roameo logo" height="45">
      </a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navMenu"
        aria-controls="navMenu"
        aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="destinations.html">Destinations</a></li>

          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- PAGE HERO -->
  <section class="page-hero">
    <div class="page-hero-overlay"></div>
    <div class="container text-center page-hero-content">
      <p class="section-label">We'd Love to Hear From You</p>
      <h1 class="page-hero-title">Contact Us</h1>
      <p class="page-hero-sub">Ready to plan your next adventure? Get in touch and we'll make it happen.</p>
    </div>
  </section>

  <!-- CONTACT SECTION -->
  <section class="contact-section py-5">
    <div class="container">
      <div class="row g-5">

        <!-- Contact Form -->
        <div class="col-lg-7">
          <h3 class="contact-form-title mb-4">Send Us an Enquiry</h3>
          <form id="contactForm" novalidate>

            <div class="row g-3">
              <div class="col-md-6">
                <label for="fullName" class="form-label">Full Name *</label>
                <input type="text" class="form-control roameo-input" id="fullName" placeholder="e.g. Amara Osei">
                <div class="invalid-feedback">Please enter your full name.</div>
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label">Email Address *</label>
                <input type="email" class="form-control roameo-input" id="email" placeholder="e.g. amara@email.com">
                <div class="invalid-feedback">Please enter a valid email address.</div>
              </div>
            </div>

            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control roameo-input" id="phone" placeholder="+254 700 000 000">
              </div>
              <div class="col-md-6">
                <label for="tripType" class="form-label">Trip Type *</label>
                <select class="form-select roameo-input" id="tripType">
                  <option value="">Select trip type...</option>
                  <option value="domestic">Domestic (Kenya)</option>
                  <option value="international">International</option>
                  <option
